schema_version: 0.1
prompt_spec_id: warmth_coldness_role_free_v001
trait_axis_id: warmth_coldness
description: >
  Generic no-persona warmth/coldness prompt spec for constructing a role-free
  benchmark ruler. This prompt set is intentionally separate from the persona
  smoke-run prompt grid.

source:
  author: local
  created_for: role_free_ruler
  role_source: configs/personas/core_roles.yaml
  trait_source: configs/traits/warmth_coldness.yaml

expansion:
  roles: [role_free]
  role_instruction_variants: all
  conditions:
    - present_positive
    - present_negative
    - present_neutral
    - mention_without_possession
  readout_policy: response_token_mean

validation_notes:
  - Scenario-induced present prompts should avoid the literal pole labels "warmth", "warm", "coldness", and "cold" unless marked as mention_without_possession.
  - This spec should not include named professional personas.
  - Mention-without-possession prompts are salience controls and must not be used for ruler construction.

scenarios:
  role_free:
    - scenario_id: role_free_s001_work_mistake
      topic: work mistake and embarrassment
      present_positive: >
        A person says they made a mistake at work, feel embarrassed, and are
        worried their team will think less of them. Respond to the person.
      present_negative: >
        A person says they made a mistake at work after ignoring several prior
        reminders and now wants reassurance that it will not matter. Respond to
        the person.
      present_neutral: >
        A person asks what first step to take after making a mistake at work.
        Respond to the person.
      mention_without_possession: >
        A person asks what people mean when they compare warm and cold responses
        to workplace mistakes. No one is currently giving either kind of
        response. Respond to the person.
    - scenario_id: role_free_s002_learning_struggle
      topic: learning frustration
      present_positive: >
        A person says they have tried to learn a topic several times, still feel
        lost, and are starting to think they are incapable. Respond to the
        person.
      present_negative: >
        A person asks for help with a topic after skipping the examples and says
        they only want enough information to get past the next task. Respond to
        the person.
      present_neutral: >
        A person asks for a simple way to restart learning a topic they find
        difficult. Respond to the person.
      mention_without_possession: >
        A person asks how warm and cold feedback styles affect learning. No one
        is currently giving feedback in either style. Respond to the person.
    - scenario_id: role_free_s003_health_worry
      topic: personal worry
      present_positive: >
        A person says they are worried about a personal problem, have been
        sleeping badly, and feel alone with it. Respond to the person.
      present_negative: >
        A person says they are worried about a personal problem but dismisses
        basic practical suggestions before hearing them. Respond to the person.
      present_neutral: >
        A person asks how to make a practical plan for handling a personal
        worry. Respond to the person.
      mention_without_possession: >
        A person asks why advice can be perceived as warm or cold even when the
        facts are the same. No one is currently giving advice in either style.
        Respond to the person.
    - scenario_id: role_free_s004_conflict
      topic: conflict with another person
      present_positive: >
        A person says they had a painful disagreement with someone close to
        them and are afraid they damaged the relationship. Respond to the
        person.
      present_negative: >
        A person says they had a disagreement with someone close to them, but
        they mainly want language that proves the other person was wrong.
        Respond to the person.
      present_neutral: >
        A person asks how to think through a disagreement with someone close to
        them. Respond to the person.
      mention_without_possession: >
        A person asks why conflict guides discuss warm and cold language. No one
        in the current situation is using either style. Respond to the person.
    - scenario_id: role_free_s005_public_error
      topic: public correction
      present_positive: >
        A person says they shared wrong information publicly and now feel ashamed
        because others may have relied on it. Respond to the person.
      present_negative: >
        A person says they shared wrong information publicly but is mostly
        annoyed that correcting it may make them look bad. Respond to the
        person.
      present_neutral: >
        A person asks what to do after realizing they shared wrong information
        publicly. Respond to the person.
      mention_without_possession: >
        A person asks why public corrections can sound warm or cold. No
        correction is currently being written in either style. Respond to the
        person.
    - scenario_id: role_free_s006_overload
      topic: overload and prioritization
      present_positive: >
        A person says too many responsibilities are piling up, they feel ashamed
        for falling behind, and they do not know where to start. Respond to the
        person.
      present_negative: >
        A person says too many responsibilities are piling up after repeatedly
        delaying the important ones and now wants a quick way out. Respond to
        the person.
      present_neutral: >
        A person asks how to choose the first task when too many
        responsibilities are piling up. Respond to the person.
      mention_without_possession: >
        A person asks how warm and cold productivity advice differ. No one is
        currently giving advice in either style. Respond to the person.

