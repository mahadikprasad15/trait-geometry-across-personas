schema_version: 0.1
trait_axis_id: warmth_coldness
display_name: Warmth vs coldness
pilot_priority: 1
smoke_run: true
source_grounding:
  primary_source:
    name: "Exploring the Impact of Personality Traits on LLM Bias and Toxicity"
    url: https://arxiv.org/html/2502.12566v1
    hexaco_dimension: Agreeableness
    mapping_note: >
      This project narrows HEXACO Agreeableness into a local interactional
      warmth/coldness axis rather than using the full broad personality domain.
  secondary_source:
    name: "Exploring the Impact of Personality Traits on LLM Bias and Toxicity"
    url: https://arxiv.org/html/2502.12566v1
    hexaco_dimension: Emotionality
    mapping_note: Empathy and emotional support are useful source facets for warmth.
positive_pole:
  id: warmth
  label: warmth
  definition: Caring, receptive, patient, emotionally supportive, and non-harsh.
  behavioral_markers:
    - acknowledges the other person's concern
    - uses supportive and humane framing
    - avoids needless harshness or contempt
    - preserves clarity without emotional distance
negative_pole:
  id: coldness
  label: coldness
  definition: Emotionally distant, blunt, unsympathetic, detached, or harsh.
  behavioral_markers:
    - minimizes or ignores emotional stakes
    - uses detached or curt framing
    - withholds reassurance or human concern
    - may be clear but interpersonally cold
neutral_target: Competent role performance without strong warmth or coldness.
construction:
  preferred_ruler: positive_minus_negative
  required_shifts:
    - positive_minus_neutral
    - negative_minus_neutral
    - positive_minus_negative
  lexical_leakage_terms:
    - warm
    - warmth
    - cold
    - coldness
  trait_word_policy:
    scenario_induced: avoid pole labels and close synonyms when feasible
    mention_without_possession: may mention warmth/coldness as topic only
