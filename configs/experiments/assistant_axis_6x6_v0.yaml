schema_version: 0.1
experiment_id: assistant_axis_6x6_v0
prompt_set_id: assistant_axis_6x6_v001
description: >
  Explicit trait-instruction expansion using Assistant Axis role instructions,
  Assistant Axis trait definitions, and a stratified 40-question subset of the
  Assistant Axis extraction questions.

source:
  name: Assistant Axis
  repository: safety-research/assistant-axis
  repository_url: https://github.com/safety-research/assistant-axis
  role_instructions_url: https://github.com/safety-research/assistant-axis/tree/master/data/roles/instructions
  trait_list_url: https://raw.githubusercontent.com/safety-research/assistant-axis/master/data/traits/trait_list.json
  questions_url: https://raw.githubusercontent.com/safety-research/assistant-axis/master/data/extraction_questions.jsonl
  notes: >
    Selected trait definitions and question texts are pinned in this config so
    prompt-grid generation does not depend on network access at runtime.

roles:
  - counselor
  - doctor
  - tutor
  - debugger
  - journalist
  - strategist

role_instruction_variants:
  mode: first_n
  first_n: 2

conditions:
  - instruction_positive
  - instruction_negative
  - instruction_neutral

readout_policy: response_token_mean
elicitation_mode: explicit_trait_instruction

trait_axes:
  - trait_axis_id: empathy_detachment
    display_name: Empathy vs detachment
    cluster: social_affective
    neutral_target: respond naturally and professionally without adding a special personality style.
    positive_pole:
      id: empathetic
      label: empathetic
      definition: Shows understanding and consideration for human emotions and perspectives.
    negative_pole:
      id: detached
      label: detached
      definition: Maintains emotional distance and presents information with clinical objectivity. Avoids personal investment in outcomes or emotional reactions.
    lexical_leakage_terms: [empathy, empathetic, detached, detachment]

  - trait_axis_id: diplomacy_bluntness
    display_name: Diplomacy vs bluntness
    cluster: social_style
    neutral_target: respond naturally and professionally without adding a special personality style.
    positive_pole:
      id: diplomatic
      label: diplomatic
      definition: Carefully navigates sensitive topics and avoids taking strong partisan stances.
    negative_pole:
      id: blunt
      label: blunt
      definition: Delivers information directly without sugar-coating or excessive politeness. Prioritizes honesty and clarity over diplomatic language.
    lexical_leakage_terms: [diplomacy, diplomatic, blunt, bluntness]

  - trait_axis_id: skeptical_naive
    display_name: Skepticism vs naivete
    cluster: epistemic_control
    neutral_target: respond naturally and professionally without adding a special personality style.
    positive_pole:
      id: skeptical
      label: skeptical
      definition: Questions assumptions, seeks evidence, and challenges conventional thinking.
    negative_pole:
      id: naive
      label: naive
      definition: Shows innocent trust, lacks worldly experience, and assumes good intentions.
    lexical_leakage_terms: [skeptic, skeptical, skepticism, naive, naivete]

  - trait_axis_id: cautious_adventurous
    display_name: Caution vs adventurousness
    cluster: risk_control
    neutral_target: respond naturally and professionally without adding a special personality style.
    positive_pole:
      id: cautious
      label: cautious
      definition: Emphasizes potential risks, limitations, and the need for careful consideration.
    negative_pole:
      id: adventurous
      label: adventurous
      definition: Encourages exploration, risk-taking, and trying new experiences. Presents exciting possibilities and unconventional approaches.
    lexical_leakage_terms: [caution, cautious, adventurous, adventurousness, risk-taking]

  - trait_axis_id: assertive_deferential
    display_name: Assertiveness vs deference
    cluster: agency
    neutral_target: respond naturally and professionally without adding a special personality style.
    positive_pole:
      id: assertive
      label: assertive
      definition: Takes clear positions and advocates strongly for particular viewpoints.
    negative_pole:
      id: deferential
      label: deferential
      definition: Shows respect by yielding to others' authority and expertise.
    lexical_leakage_terms: [assertive, assertiveness, deferential, deference]

  - trait_axis_id: calm_anxious
    display_name: Calmness vs anxiety
    cluster: emotional_regulation
    neutral_target: respond naturally and professionally without adding a special personality style.
    positive_pole:
      id: calm
      label: calm
      definition: Maintains steady, unruffled demeanor regardless of topic intensity. Provides measured responses that help de-escalate tensions and promote rational discussion.
    negative_pole:
      id: anxious
      label: anxious
      definition: Displays persistent worry, anticipates negative outcomes, and shows nervous energy.
    lexical_leakage_terms: [calm, calmness, anxious, anxiety]

